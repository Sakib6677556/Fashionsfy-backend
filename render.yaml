services:
  - type: web
    name: fashionsfy-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # ⚠️ Add these manually in Render Dashboard → Environment:
      # MONGODB_URI  → your Atlas connection string
      # JWT_SECRET   → a long random string
      # FRONTEND_URL → your Netlify URL e.g. https://fashionsfy.netlify.app
      # CLOUDINARY_CLOUD_NAME
      # CLOUDINARY_API_KEY
      # CLOUDINARY_API_SECRET
      # ADMIN_EMAIL
      # ADMIN_PASSWORD
